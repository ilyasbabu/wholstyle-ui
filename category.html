<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHOLSTYLE — Category</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#00C853', brandDark: '#009624',
                        ink: '#0A0A0A', ash: '#F5F5F3', muted: '#9E9E9E', surface: '#FFFFFF',
                        overlay: 'rgba(10,10,10,0.06)', highlight: '#5BB8F5',
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['DM Sans', 'sans-serif'],
                        label: ['Bebas Neue', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            overflow: hidden;
            background: #F5F5F3;
            scroll-behavior: smooth;
        }

        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #F5F5F3;
            color: #0A0A0A;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }



        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .fade-up { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) both; }
        .fade-up-1 { animation-delay: 0.05s; }
        .fade-up-2 { animation-delay: 0.12s; }
        .fade-up-3 { animation-delay: 0.19s; }
        .fade-in { animation: fadeIn 0.4s ease both; }

        /* ── TOP BAR ── */
        .top-bar {
            flex-shrink: 0;
            background: rgba(245, 245, 243, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 768px) {
            .top-bar {
                padding: 12px 32px;
                gap: 12px;
            }
        }

        /* Active category pill — wide green */
        .active-cat-pill {
            flex: 1;
            min-width: 0;
            background: #00C853;
            border: none;
            border-radius: 100px;
            padding: 10px 18px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.08em;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            transition: background 0.15s;
        }

        .active-cat-pill:hover {
            background: #009624;
        }

        /* Quick filter pills */
        .quick-pill {
            flex-shrink: 0;
            background: #00C853;
            border: none;
            border-radius: 100px;
            padding: 10px 16px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.07em;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, transform 0.1s;
        }

        .quick-pill:hover {
            background: #009624;
            transform: scale(0.98);
        }

        .quick-pill.active-pill {
            background: #0A0A0A;
        }

        /* Top bar icon button */
        .icon-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            color: #0A0A0A;
            transition: opacity 0.15s, transform 0.15s;
        }

        .icon-btn:hover {
            opacity: 0.6;
            transform: scale(1.08);
        }

        /* ── BODY: sidebar + main ── */
        .body-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width: 88px;
            flex-shrink: 0;
            background: #EAEAE8;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 0 80px;
            /* bottom padding to clear bottom nav */
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (min-width: 480px) {
            .sidebar {
                width: 100px;
            }
        }

        @media (min-width: 768px) {
            .sidebar {
                width: 120px;
            }
        }

        .sidebar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 8px 10px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
            position: relative;
        }

        .sidebar-item.active {
            background: #F5F5F3;
            border-left-color: #00C853;
        }

        .sidebar-item:hover:not(.active) {
            background: #E0E0DE;
        }

        .sidebar-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #C8C8C6;
            margin-bottom: 7px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, box-shadow 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .sidebar-item.active .sidebar-circle {
            background: #B0B0AE;
            box-shadow: 0 0 0 2.5px #00C853;
            transform: scale(1.05);
        }

        @media (min-width: 480px) {
            .sidebar-circle {
                width: 62px;
                height: 62px;
            }
        }

        @media (min-width: 768px) {
            .sidebar-circle {
                width: 72px;
                height: 72px;
            }
        }

        .sidebar-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 11px;
            letter-spacing: 0.1em;
            color: #0A0A0A;
            text-align: center;
            line-height: 1.2;
        }

        .sidebar-sublabel {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            color: #9E9E9E;
            text-align: center;
            margin-top: 1px;
            line-height: 1.2;
        }

        .sidebar-item.active .sidebar-label {
            color: #00C853;
        }

        /* ── RIGHT CONTENT ── */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background: #fff;
            padding: 12px 10px 80px;
            min-width: 0;
        }

        @media (min-width: 768px) {
            .main-content {
                padding: 16px 24px 80px;
            }
        }

        .main-content::-webkit-scrollbar {
            display: none;
        }

        .main-content {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Section label between groups */
        .section-divider {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #9E9E9E;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 6px 0 8px;
        }

        /* 3-col subcat grid */
        .subcat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        @media (min-width: 640px) {
            .subcat-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }

        @media (min-width: 900px) {
            .subcat-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
            }
        }

        .subcat-card {
            cursor: pointer;
            transition: transform 0.22s cubic-bezier(.22,1,.36,1), box-shadow 0.22s;
        }

        .subcat-card:hover {
            transform: translateY(-4px);
        }

        .subcat-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 14px;
            background: #C8C8C6;
            margin-bottom: 5px;
            overflow: hidden;
            position: relative;
            transition: filter 0.15s, box-shadow 0.22s;
        }

        .subcat-card:hover .subcat-img {
            filter: brightness(0.92);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        }

        .subcat-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #0A0A0A;
            text-align: center;
            line-height: 1.2;
        }

        /* row spacer between pairs */
        .row-gap {
            height: 14px;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            flex-shrink: 0;
            background: rgba(245, 245, 243, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.07);
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 0 10px;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: none;
            transition: transform 0.15s;
        }

        .nav-btn:hover {
            transform: translateY(-1px);
        }

        .nav-lbl {
            font-size: 10px;
            color: #9E9E9E;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-btn.active .nav-lbl {
            color: #00C853;
            font-weight: 600;
        }

        .nav-ic {
            color: #9E9E9E;
            display: flex;
        }

        .nav-btn.active .nav-ic {
            color: #00C853;
        }

        /* subtle color tints for subcategory placeholders */
        .tint-1 {
            background: #C8C8C6;
        }

        .tint-2 {
            background: #BABAB8;
        }

        .tint-3 {
            background: #D0D0CE;
        }

        .tint-4 {
            background: #C0C0BE;
        }

        .tint-5 {
            background: #CACAC8;
        }

        .tint-6 {
            background: #B8B8B6;
        }
    </style>
</head>

    <script>
        // Category data — subcategories per gender
        const categoryData = {
            'MEN': ['Shirts', 'Jeans', 'T-Shirts', 'Trousers', 'Shorts', 'Jackets', 'Co-ords', 'Sweatshirts', 'Activewear', 'Polos', 'Cargo', 'Blazers'],
            'WOMEN': ['Kurtis', 'Sarees', 'Dresses', 'Leggings', 'Tops', 'Skirts', 'Co-ords', 'Palazzo', 'Anarkali', 'Blouses', 'Nightwear', 'Jackets'],
            'LITTLE BOYS': ['T-Shirts', 'Shorts', 'Jeans', 'Shirts', 'Dungarees', 'Sets'],
            'BOYS': ['T-Shirts', 'Jeans', 'Shirts', 'Shorts', 'Sweatshirts', 'Joggers'],
            'BRANDS': ['Defend', 'Barracuda', 'FUGA', 'Kasay', 'Game', 'Ludhiana Co.'],
            'ACCESSORIES': ['Caps', 'Bags', 'Belts', 'Wallets', 'Socks', 'Sunglasses'],
        };

        const tints = ['tint-1', 'tint-2', 'tint-3', 'tint-4', 'tint-5', 'tint-6'];

        function renderSubcats(catName) {
            const items = categoryData[catName] || [];
            const grid = document.getElementById('mainContent');
            let html = '';

            // Render in pairs of rows (6 items per pair = 2 rows of 3)
            for (let i = 0; i < items.length; i += 6) {
                const chunk = items.slice(i, i + 6);
                const row1 = chunk.slice(0, 3);
                const row2 = chunk.slice(3, 6);

                html += renderRow(row1, i);
                if (row2.length) html += renderRow(row2, i + 3);
                if (i + 6 < items.length) html += '<div class="row-gap"></div>';
            }

            html += '<div style="height:20px;"></div>';
            grid.innerHTML = html;
        }

        function renderRow(items, offset) {
            let html = '<div class="subcat-grid">';
            items.forEach((name, idx) => {
                const tint = tints[(offset + idx) % tints.length];
                const delay = (offset + idx) * 0.04;
                html += `
        <div class="subcat-card" onclick="openSubcat('${name}')" style="animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1) ${delay}s both;">
          <div class="subcat-img ${tint}"></div>
          <div class="subcat-label">${name}</div>
        </div>`;
            });
            // Fill empty slots if row has fewer than 3
            while (items.length < 3) {
                html += '<div></div>';
                items.push('');
            }
            html += '</div>';
            return html;
        }

        function selectCategory(el, catName) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('activePill').textContent = catName;
            renderSubcats(catName);
            // Scroll main content to top
            document.getElementById('mainContent').scrollTop = 0;
        }

        function toggleQuick(el) {
            el.classList.toggle('active-pill');
        }

        function openSubcat(name) {
            // placeholder — would navigate to search results
            console.log('Open subcategory:', name);
        }

        function setActive(el) {
            document.querySelectorAll('.bottom-nav a').forEach(btn => {
                btn.querySelector('.nav-ic').classList.remove('text-brand');
                btn.querySelector('.nav-ic').classList.add('text-muted');
                btn.querySelector('.nav-lbl').classList.remove('text-brand', 'font-semibold');
                btn.querySelector('.nav-lbl').classList.add('text-muted');
            });

            el.querySelector('.nav-ic').classList.remove('text-muted');
            el.querySelector('.nav-ic').classList.add('text-brand');
            el.querySelector('.nav-lbl').classList.remove('text-muted');
            el.querySelector('.nav-lbl').classList.add('text-brand', 'font-semibold');
        }

        // Init with MEN
        renderSubcats('MEN');
    </script>
