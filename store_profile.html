  function toggleFollow() {
    const btn = document.getElementById('followBtn');
    const followIcon = document.getElementById('followIcon');
    const followText = document.getElementById('followText');
    
    const isFollowing = btn.classList.contains('bg-white');
    
    if (isFollowing) {
      // Unfollow State
      btn.className = "col-span-5 bg-indigo hover:bg-indigo/90 text-white font-bold rounded-xl py-3 transition-all duration-150 active:scale-[0.98] shadow-sm flex items-center justify-center gap-1.5 text-xs cursor-pointer";
      followIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />`;
      followText.textContent = "Follow";
    } else {
      // Followed State
      btn.className = "col-span-5 bg-white border border-indigo text-indigo font-bold rounded-xl py-3 transition-all duration-150 active:scale-[0.98] shadow-sm flex items-center justify-center gap-1.5 text-xs cursor-pointer";
      followIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />`;
      followText.textContent = "Following";
    }
  }

  function selectTab(el, category) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('bg-ink', 'text-white');
      btn.classList.add('text-muted', 'hover:text-ink', 'hover:bg-ash/50');
    });
    
    el.classList.remove('text-muted', 'hover:text-ink', 'hover:bg-ash/50');
    el.classList.add('bg-ink', 'text-white');
    
    renderCatalog(category);
  }

  function renderCatalog(category) {
    const grid = document.getElementById('catalogGrid');
    const filteredProducts = catalogData.filter(p => p.category === category);
    
    let html = "";
    filteredProducts.forEach((prod, i) => {
      const delay = i * 0.04;
      html += `
      <article class="product-item bg-white rounded-2xl border border-[#E0E0DE]/70 overflow-hidden group cursor-pointer transition-all duration-300 hover:-translate-y-0.5 hover:shadow-md" style="animation: fadeUp 0.35s cubic-bezier(.22,1,.36,1) ${delay}s both;">
        
        <!-- Image Container -->
        <div class="aspect-[3/4] relative overflow-hidden bg-ash">
          <!-- Colorful backdrop placeholder -->
          <div class="absolute inset-0 bg-gradient-to-br ${prod.bgGradient} transition-transform duration-500 group-hover:scale-105 opacity-90"></div>
          
          <!-- MOQ indicator -->
          <div class="absolute bottom-2.5 left-2.5 bg-ink/75 backdrop-blur-md text-white text-[8px] md:text-[10px] font-bold px-2 py-0.5 rounded-md tracking-wider font-body">
            MOQ ${prod.moq}
          </div>

          <!-- Save Button -->
          <button class="absolute top-2 right-2 w-7 h-7 rounded-full bg-white/95 backdrop-blur-md flex items-center justify-center border border-gray-100 opacity-0 group-hover:opacity-100 transition-all duration-200 hover:bg-white active:scale-95 shadow-sm z-10 cursor-pointer" aria-label="Save product" onclick="event.stopPropagation();">
            <svg width="12" height="12" fill="none" stroke="#0A0A0A" stroke-width="2" viewBox="0 0 24 24">
              <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
            </svg>
          </button>
        </div>

        <!-- Info Block -->
        <div class="p-2.5 border-t border-[#E0E0DE]/40">
          <div class="text-[8px] text-muted font-bold uppercase tracking-wider font-body">Manhattan Premium</div>
          <h3 class="font-body text-[11px] md:text-xs font-bold text-ink mt-0.5 truncate group-hover:text-indigo transition-colors duration-150">${prod.name}</h3>
          
          <div class="flex items-baseline justify-between mt-2">
            <span class="text-xs md:text-sm font-bold text-ink font-body">₹${prod.price} <span class="text-[9px] text-muted font-normal">/pc</span></span>
            <span class="text-[8px] text-[#00C853] font-bold bg-[#E8F5E9] px-1.5 py-0.5 rounded uppercase tracking-wider font-body">Active</span>
          </div>
        </div>

      </article>
      `;
    });
    
    grid.innerHTML = html;
  }

  function handleCall() {
    const btn = document.getElementById('callBtn');
    btn.textContent = 'Calling…';
    btn.style.borderColor = '#00C853';
    btn.style.color = '#00C853';
    setTimeout(() => {
      btn.textContent = 'Call';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  }

  // Initial render (Sets category)
  renderCatalog("Sets");
</script>
