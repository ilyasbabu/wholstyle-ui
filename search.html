<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: '#00C853',
        brandDark: '#009624',
        ink: '#0A0A0A',
        ash: '#F5F5F3',
        muted: '#9E9E9E',
        surface: '#FFFFFF',
        overlay: 'rgba(10,10,10,0.06)',
        highlight: '#5BB8F5',
      },
      fontFamily: {

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F5F5F3;
    color: #0A0A0A;
    overscroll-behavior: none;
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* ── TOP TOOLBAR ── */
  .top-toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(245,245,243,0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  /* Filter pills */
  .filter-pill {
    border: 1.5px solid #C8C8C6;
    background: #fff;
    border-radius: 100px;
    padding: 7px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: #0A0A0A;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .filter-pill:hover { background: #f0f0ee; }

  /* Style chips — plain text row */
  .style-chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #0A0A0A;
    white-space: nowrap;
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: border-color 0.15s, font-weight 0.1s;
  }
  .style-chip.active {
    font-weight: 600;
    border-bottom-color: #0A0A0A;
  }

  /* ── MARKET TABS — float over grid ── */
  .market-tabs-row {
    display: flex;
    gap: 0;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
  }
  .market-tabs-row::-webkit-scrollbar { display: none; }

  .market-tab {
    flex-shrink: 0;
    width: 120px;
    height: 72px;
    position: relative;
    cursor: pointer;
    border-right: 0.5px solid rgba(255,255,255,0.2);
    transition: filter 0.15s;
  }
  .market-tab:not(.active) { filter: brightness(0.75) saturate(0.7); }
  .market-tab.active { filter: brightness(1) saturate(1); }
  .market-tab:hover { filter: brightness(0.9) saturate(0.9); }

  .market-tab-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    padding: 7px 8px;
    position: relative;
  }
  .market-tab-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 65%);
  }
  .market-tab-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #fff;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }

  /* ── PRODUCT GRID — edge to edge, uniform 4 cols, square cells ── */
  .grid-wrapper {
    position: relative;
    width: 100%;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    width: 100%;
  }
  @media (min-width: 640px)  { .product-grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 900px)  { .product-grid { grid-template-columns: repeat(6, 1fr); } }
  @media (min-width: 1200px) { .product-grid { grid-template-columns: repeat(8, 1fr); } }

  .product-cell {
    aspect-ratio: 1 / 1;
    position: relative;
    cursor: pointer;
    border-right: 0.5px solid rgba(0,0,0,0.1);
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    overflow: hidden;
    transition: filter 0.15s;
  }
  .product-cell:hover { filter: brightness(0.92); }

  .search-float {
    position: fixed;
    bottom: 68px;
    left: 0; right: 0;
    z-index: 50;
    padding: 0 10px 8px;
  }

  .search-box {
    background: #fff;
    border-radius: 18px;
    padding: 13px 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.14);
    display: flex;
    align-items: flex-start;
    gap: 11px;
  }

  .search-main-text {
    font-size: 13px;
    font-weight: 600;
    color: #0A0A0A;
    line-height: 1.3;
    font-family: 'DM Sans', sans-serif;
  }

  .search-recent-line {
    font-size: 12px;
    color: #9E9E9E;
    line-height: 1.6;
    font-family: 'DM Sans', sans-serif;
  }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(245,245,243,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(0,0,0,0.07);
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
  }

  @media (min-width: 768px) {
    .top-toolbar > div { padding-left: 32px; padding-right: 32px; }
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0 12px;
    cursor: pointer;
    background: none;
    border: none;
  }
  .nav-lbl {
    font-size: 10px;
    color: #9E9E9E;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-btn.active .nav-lbl { color: #00C853; font-weight: 600; }
  .nav-ic { color: #9E9E9E; display:flex; }
  .nav-btn.active .nav-ic { color: #00C853; }
</style>

<script>
  function selectMarket(el) {
    document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  document.querySelectorAll('.style-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
    });
  });

  function setActive(el) {
    document.querySelectorAll('.bottom-nav a').forEach(btn => {
      btn.querySelector('.nav-ic').classList.remove('text-brand');
      btn.querySelector('.nav-ic').classList.add('text-muted');
      btn.querySelector('.nav-lbl').classList.remove('text-brand', 'font-semibold');
      btn.querySelector('.nav-lbl').classList.add('text-muted');
    });
    el.querySelector('.nav-ic').classList.remove('text-muted');
    el.querySelector('.nav-ic').classList.add('text-brand');
    el.querySelector('.nav-lbl').classList.remove('text-muted');
    el.querySelector('.nav-lbl').classList.add('text-brand', 'font-semibold');
  }

  // Header scroll behavior
  let lastScrollY = window.scrollY;
  const topNavbar = document.getElementById('top-navbar');

  window.addEventListener('scroll', () => {
    const currentScrollY = window.scrollY;
    
    // If scrolling down and past 50px, hide the header
    if (currentScrollY > lastScrollY && currentScrollY > 50) {
      topNavbar.style.transform = 'translateY(-100%)';
    } else {
      // If scrolling up, show it
      topNavbar.style.transform = 'translateY(0)';
    }
    lastScrollY = currentScrollY;
  }, { passive: true });
</script>
